{{- if and .Values.ha.enabled (not .Values.sessions.existingSecret) }}
{{- $url := include "scrub.redisUrl" . -}}
{{- if or .Values.sessions.encryptionKey $url }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-env" (include "scrub.fullname" .) }}
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.sessions.encryptionKey }}
  encryption-key: {{ .Values.sessions.encryptionKey | quote }}
  {{- end }}
  {{- if $url }}
  redis-url: {{ $url | quote }}
  {{- end }}
{{- end }}
{{- end }}
