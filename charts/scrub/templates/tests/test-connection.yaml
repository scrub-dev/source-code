apiVersion: v1
kind: Pod
metadata:
  name: {{ include "scrub.fullname" . }}-test
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: busybox:stable
      command: ["wget"]
      args: ["-qO-", "http://{{ include "scrub.fullname" . }}:{{ .Values.service.port }}/healthz"]
