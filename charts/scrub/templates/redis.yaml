{{- if and .Values.redis.enabled (not .Values.redis.url) }}
{{- $name := include "scrub.redisFullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    {{- include "scrub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- if and .Values.redis.password (not .Values.redis.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  redis-password: {{ .Values.redis.password | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  serviceName: {{ $name }}
  selector:
    matchLabels:
      {{- include "scrub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "scrub.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          command: ["redis-server"]
          args:
            {{- if or .Values.redis.password .Values.redis.existingSecret }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
            {{- if .Values.redis.persistence.enabled }}
            - --appendonly
            - "yes"
            {{- end }}
          {{- if or .Values.redis.password .Values.redis.existingSecret }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scrub.redisSecretName" . }}
                  key: redis-password
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      {{- if not .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
        {{- with .Values.redis.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
  {{- end }}
{{- end }}
