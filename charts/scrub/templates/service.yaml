apiVersion: v1
kind: Service
metadata:
  name: {{ include "scrub.fullname" . }}
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "scrub.selectorLabels" . | nindent 4 }}
{{- if .Values.ha.enabled }}
---
# Headless service for stable per-pod DNS in the StatefulSet.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scrub.fullname" . }}-headless
  labels:
    {{- include "scrub.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "scrub.selectorLabels" . | nindent 4 }}
{{- end }}
