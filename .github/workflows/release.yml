name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Cross linkers/musl tools for the Linux aarch64 / musl targets. The
      # linker/CC settings themselves live in the committed .cargo/config.toml
      # (don't append here — that produces duplicate TOML keys).
      - name: Install cross toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p scrub

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          out="scrub-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "$out"
          cp "target/${{ matrix.target }}/release/scrub" "$out/"
          cp README.md LICENSE scrub.example.yaml "$out/"
          tar czf "$out.tar.gz" "$out"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          out="scrub-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "$out"
          cp "target/${{ matrix.target }}/release/scrub.exe" "$out/"
          cp README.md LICENSE scrub.example.yaml "$out/"
          7z a "$out.zip" "$out"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scrub-*.tar.gz
            scrub-*.zip

      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: scrub-${{ matrix.target }}
          path: |
            scrub-*.tar.gz
            scrub-*.zip

  # Attach SHA-256 checksums and CHANGELOG-derived release notes.
  finalize:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Notes + checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          # Extract this version's CHANGELOG section as the release notes.
          awk -v ver="$ver" '
            $0 ~ ("^## \\[" ver "\\]") { f=1; next }
            /^## \[/ { f=0 }
            f { print }
          ' CHANGELOG.md > NOTES.md || true
          [ -s NOTES.md ] || echo "Release ${GITHUB_REF_NAME}." > NOTES.md
          # Checksums over all published assets.
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern 'scrub-*' --dir dist
          (cd dist && sha256sum scrub-* > SHA256SUMS)
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file NOTES.md
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" dist/SHA256SUMS --clobber

  # Build and publish the container image to GitHub Container Registry.
  image:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scrub:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/scrub:latest
