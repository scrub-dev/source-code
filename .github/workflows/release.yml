name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Cross linkers/musl tools for the Linux aarch64 / musl targets.
      - name: Install cross toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          [env]
          CC_aarch64_unknown_linux_gnu = "aarch64-linux-gnu-gcc"
          CC_aarch64_unknown_linux_musl = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p scrub

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          out="scrub-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "$out"
          cp "target/${{ matrix.target }}/release/scrub" "$out/"
          cp README.md LICENSE scrub.example.yaml "$out/"
          tar czf "$out.tar.gz" "$out"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          out="scrub-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "$out"
          cp "target/${{ matrix.target }}/release/scrub.exe" "$out/"
          cp README.md LICENSE scrub.example.yaml "$out/"
          7z a "$out.zip" "$out"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scrub-*.tar.gz
            scrub-*.zip

      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: scrub-${{ matrix.target }}
          path: |
            scrub-*.tar.gz
            scrub-*.zip
