name: Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "SECURITY.md"
      - "DESIGN.md"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site
        run: |
          pip install -r website/requirements.txt
          python website/build.py
      # Always available: a downloadable static-site bundle (host it anywhere).
      - uses: actions/upload-artifact@v4
        with:
          name: scrub-site
          path: website/dist
      # For GitHub Pages deploy (only consumed when the deploy job runs).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  # Deploys to GitHub Pages. Requires Pages (public repo or a plan that includes it)
  # with Source = GitHub Actions; then set repository variable ENABLE_PAGES=true.
  deploy:
    needs: build
    if: vars.ENABLE_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
